general {
	border_size = 2

	gaps_in = 2
	gaps_out = 4
	float_gaps = 0
	gaps_workspaces = 0

	col.inactive_border = rgb(108,112,134)
	col.active_border = rgb(137,180,250)
	col.nogroup_border = rgb(108,112,134)
	col.nogroup_border_active = rgb(137,180,250)

	layout = dwindle
	no_focus_fallback = true
	resize_on_border = false
	extend_border_grab_area = 0
	hover_icon_on_border = false
	allow_tearing = false
	resize_corner = 0
	modal_parent_blocking = true
	locale = en_US.UTF-8

	snap {
		enabled = false
		window_gap = 0
		monitor_gap = 0
		border_overlap = false
		respect_gaps = false
	}
}
